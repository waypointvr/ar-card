<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>YOUR COMPANY NAME • AR Card</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  //cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .ar-scene {
      position: fixed;
      inset: 0;
      z-index: 1;
    }

    .loading {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at center, rgba(10, 18, 35, 0.95), rgba(0, 0, 0, 1));
      color: white;
      z-index: 20;
      font-size: 14px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      pointer-events: none;
      transition: opacity 0.35s ease;
    }

    .loading.hidden {
      opacity: 0;
    }
  </style>
</head>
<body>
  <div id="loading" class="loading">Scanning card…</div>

  <a-scene
    class="ar-scene"
    mindar-image="imageTargetSrc: ./targets.mind;"
    embedded
    color-space="sRGB"
    renderer="colorManagement: true, physicallyCorrectLights: true, alpha: true, antialias: true"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false">

    <a-assets>
      <img id="company-logo" src="./logo.png" />
      <img id="icon-glow" src="./logo.png" />
    </a-assets>

    <a-camera
      position="0 0 0"
      look-controls="enabled: false"
      cursor="fuse: false; rayOrigin: mouse;"
      raycaster="objects: .clickable; far: 20;">
    </a-camera>

    <a-entity id="target" mindar-image-target="targetIndex: 0" visible="false">

      <!-- Base holographic glow layer, slightly larger than the physical card -->
      <a-plane
        position="0 0 0"
        rotation="0 0 0"
        width="1.12"
        height="0.72"
        material="color: #38bdf8; transparent: true; opacity: 0.08; emissive: #38bdf8; emissiveIntensity: 0.9; side: double;">
      </a-plane>

      <!-- Soft outer bloom -->
      <a-circle
        position="0 0 -0.005"
        radius="0.72"
        material="color: #67e8f9; transparent: true; opacity: 0.05; emissive: #67e8f9; emissiveIntensity: 0.6; side: double;">
      </a-circle>

      <!-- Subtle shadow / anchor under the stack -->
      <a-plane
        position="0 -0.18 -0.01"
        rotation="-90 0 0"
        width="0.95"
        height="0.95"
        material="color: #000000; transparent: true; opacity: 0.18; side: double;">
      </a-plane>

      <!-- Main AR content group -->
      <a-entity
        id="holo-card"
        position="0 0.02 0.08"
        animation="property: position; from: 0 -0.03 0.08; to: 0 0.02 0.08; dur: 900; easing: easeOutCubic; startEvents: targetFound"
        animation__scale="property: scale; from: 0.8 0.8 0.8; to: 1 1 1; dur: 900; easing: easeOutCubic; startEvents: targetFound"
        animation__fade="property: material.opacity; from: 0; to: 1; dur: 800; easing: easeOutQuad; startEvents: targetFound">

        <!-- Gentle floating motion for the full stack -->
        <a-entity
          position="0 0 0"
          animation="property: position; dir: alternate; dur: 2600; loop: true; easing: easeInOutSine; to: 0 0.02 0">
          
          <!-- Middle logo layer -->
          <a-plane
            position="0 0.12 0.05"
            width="0.34"
            height="0.34"
            material="src: #company-logo; transparent: true; opacity: 0.98; emissive: #ffffff; emissiveIntensity: 0.18; side: double;">
          </a-plane>

          <!-- Glow ring behind logo -->
          <a-circle
            position="0 0.11 0.02"
            radius="0.22"
            material="color: #38bdf8; transparent: true; opacity: 0.14; emissive: #38bdf8; emissiveIntensity: 1; side: double;">
          </a-circle>

          <!-- Company name -->
          <a-text
            value="YOUR COMPANY NAME"
            position="0 0.34 0.1"
            align="center"
            anchor="center"
            baseline="center"
            color="#f8fbff"
            width="1.8"
            font="https://cdn.aframe.io/fonts/Exo2SemiBold.fnt"
            material="transparent: true; opacity: 0.98;">
          </a-text>

          <!-- Tagline -->
          <a-text
            value="Premium immersive experiences"
            position="0 0.22 0.13"
            align="center"
            anchor="center"
            baseline="center"
            color="#8fdcff"
            width="1.55"
            font="https://cdn.aframe.io/fonts/Exo2SemiBold.fnt"
            material="transparent: true; opacity: 0.82;">
          </a-text>

          <!-- Fine divider line -->
          <a-plane
            position="0 0.14 0.09"
            width="0.72"
            height="0.004"
            material="color: #67e8f9; transparent: true; opacity: 0.35; emissive: #67e8f9; emissiveIntensity: 0.8;">
          </a-plane>

          <!-- Icon row -->
          <a-entity position="0 -0.02 0.15">
            <!-- Website -->
            <a-entity
              class="clickable"
              geometry="primitive: circle; radius: 0.055"
              material="color: #0ea5e9; transparent: true; opacity: 0.18; emissive: #0ea5e9; emissiveIntensity: 1; side: double;"
              position="-0.22 0 0"
              website-link
              animation="property: scale; dir: alternate; dur: 2200; loop: true; easing: easeInOutSine; to: 1.06 1.06 1.06">
              <a-text
                value=""
                position="0 0 0.01"
                align="center"
                anchor="center"
                baseline="center"
                color="#e0f7ff"
                width="0.6"
                font="https://cdn.aframe.io/fonts/FontAwesome.fnt">
              </a-text>
            </a-entity>

            <!-- Email -->
            <a-entity
              class="clickable"
              geometry="primitive: circle; radius: 0.055"
              material="color: #22c55e; transparent: true; opacity: 0.18; emissive: #22c55e; emissiveIntensity: 1; side: double;"
              position="0 0 0"
              email-link
              animation="property: scale; dir: alternate; dur: 2400; loop: true; easing: easeInOutSine; to: 1.06 1.06 1.06">
              <a-text
                value=""
                position="0 0 0.01"
                align="center"
                anchor="center"
                baseline="center"
                color="#effff2"
                width="0.58"
                font="https://cdn.aframe.io/fonts/FontAwesome.fnt">
              </a-text>
            </a-entity>

            <!-- Social -->
            <a-entity
              class="clickable"
              geometry="primitive: circle; radius: 0.055"
              material="color: #a855f7; transparent: true; opacity: 0.18; emissive: #a855f7; emissiveIntensity: 1; side: double;"
              position="0.22 0 0"
              social-link
              animation="property: scale; dir: alternate; dur: 2600; loop: true; easing: easeInOutSine; to: 1.06 1.06 1.06">
              <a-text
                value=""
                position="-0.01 0 0.01"
                align="center"
                anchor="center"
                baseline="center"
                color="#faf2ff"
                width="0.58"
                font="https://cdn.aframe.io/fonts/FontAwesome.fnt">
              </a-text>
            </a-entity>
          </a-entity>

        </a-entity>
      </a-entity>

      <!-- Very subtle ambient particles using simple circles -->
      <a-circle
        position="-0.34 0.24 0.02"
        radius="0.03"
        material="color: #ffffff; transparent: true; opacity: 0.14; emissive: #67e8f9; emissiveIntensity: 1;">
      </a-circle>
      <a-circle
        position="0.34 -0.04 0.02"
        radius="0.02"
        material="color: #ffffff; transparent: true; opacity: 0.10; emissive: #38bdf8; emissiveIntensity: 1;">
      </a-circle>
      <a-circle
        position="-0.28 -0.16 0.03"
        radius="0.018"
        material="color: #ffffff; transparent: true; opacity: 0.09; emissive: #a855f7; emissiveIntensity: 1;">
      </a-circle>
    </a-entity>
  </a-scene>

  <script>
    AFRAME.registerComponent('website-link', {
      init: function () {
        this.el.addEventListener('click', function () {
          window.open('https://www.yourcompanyname.com', '_blank', 'noopener,noreferrer');
        });
      }
    });

    AFRAME.registerComponent('email-link', {
      init: function () {
        this.el.addEventListener('click', function () {
          window.location.href = 'mailto:hello@yourcompanyname.com';
        });
      }
    });

    AFRAME.registerComponent('social-link', {
      init: function () {
        this.el.addEventListener('click', function () {
          window.open('https://www.instagram.com/', '_blank', 'noopener,noreferrer');
        });
      }
    });

    window.addEventListener('load', () => {
      const sceneEl = document.querySelector('a-scene');
      const targetEl = document.querySelector('#target');
      const loadingEl = document.getElementById('loading');

      const showCard = () => {
        targetEl.setAttribute('visible', 'true');
        loadingEl.classList.add('hidden');
        setTimeout(() => loadingEl.style.display = 'none', 350);
      };

      const hideCard = () => {
        targetEl.setAttribute('visible', 'false');
        loadingEl.style.display = 'flex';
        loadingEl.classList.remove('hidden');
        loadingEl.textContent = 'Scanning card…';
      };

      targetEl.addEventListener('targetFound', showCard);
      targetEl.addEventListener('targetLost', hideCard);

      sceneEl.addEventListener('renderstart', () => {
        const camera = sceneEl.camera && sceneEl.camera.el;
        if (camera) {
          camera.setAttribute('position', '0 0 0');
        }
      });
    });
  </script>
</body>
</html>
