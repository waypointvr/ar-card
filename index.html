<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Waypoint VR • AR Card</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
body { margin:0; overflow:hidden; font-family: system-ui; }

/* AR CAMERA */
.ar-scene {
    position: fixed;
    inset: 0;
    z-index: 1;
}

/* FLOATING UI */
#ui-panel {
    position: fixed;
    bottom: 25px;
    left: 50%;
    transform: translateX(-50%);
    width: 92%;
    max-width: 420px;
    z-index: 10;

    background: rgba(0,0,0,0.2);
    backdrop-filter: blur(10px);

    border-radius: 24px;
    border: 1px solid rgba(255,255,255,0.2);
    box-shadow: 0 10px 40px rgba(0,0,0,0.4);

    animation: floatUp .4s ease;
}

@keyframes floatUp {
    from { transform: translate(-50%,40px); opacity:0; }
    to { transform: translate(-50%,0); opacity:1; }
}

.carousel {
    display:flex;
    overflow-x:auto;
    scroll-snap-type:x mandatory;
    scroll-behavior:smooth;
}

.slide {
    min-width:100%;
    padding:20px;
    scroll-snap-align:start;
}
</style>
</head>

<body>

<!-- AR SCENE -->
<a-scene class="ar-scene"
mindar-image="imageTargetSrc: ./targets.mind;"
embedded
vr-mode-ui="enabled:false"
device-orientation-permission-ui="enabled:false">

<a-camera position="0 0 0"></a-camera>

<a-entity id="target" mindar-image-target="targetIndex: 0">

<!-- BASE LOGO -->
<a-plane position="0 0.2 0"
width="0.6" height="0.3"
material="src: ./logo.png; transparent:true">
</a-plane>

<!-- 🔵 GLOW RING -->
<a-ring position="0 0 0"
radius-inner="0.35"
radius-outer="0.45"
color="#38bdf8"
opacity="0.6">

<a-animation attribute="rotation"
to="0 360 0"
dur="4000"
repeat="indefinite"></a-animation>

</a-ring>

<!-- ✨ FLOATING PARTICLES -->
<a-entity id="particles">
<a-sphere radius="0.02" color="#38bdf8" position="-0.2 0.1 0"></a-sphere>
<a-sphere radius="0.015" color="#7dd3fc" position="0.2 0.15 0"></a-sphere>
<a-sphere radius="0.01" color="#bae6fd" position="0 0.25 0"></a-sphere>

<a-animation attribute="position"
dur="3000"
direction="alternate"
repeat="indefinite"
to="0 0.4 0"></a-animation>
</a-entity>

<!-- 💡 PULSE BACKLIGHT -->
<a-plane position="0 0.2 -0.01"
width="0.8" height="0.5"
color="#38bdf8"
opacity="0.15">

<a-animation attribute="scale"
to="1.1 1.1 1"
dur="1200"
direction="alternate"
repeat="indefinite"></a-animation>

</a-plane>

</a-entity>
</a-scene>

<!-- FLOATING UI -->
<div id="ui-panel" class="hidden text-white">

<!-- HEADER -->
<div class="flex justify-between items-center px-4 pt-3">
<a href="https://www.waypoint-vr.com" target="_blank">
<img src="./logo.png" class="w-10 h-10 rounded-xl cursor-pointer">
</a>
<button onclick="hideUI()">✕</button>
</div>

<!-- CAROUSEL -->
<div id="carousel" class="carousel">

<div class="slide text-center">
<img src="./logo.png" class="w-24 mx-auto mb-4">
<h2 class="text-xl font-semibold">Waypoint VR</h2>
<p class="text-sky-300">Immersive AR experiences</p>
</div>

<div class="slide">
<h3 class="mb-2">🎥 Demo</h3>
<video controls class="w-full rounded-xl">
<source src="./AR Promo.mp4" type="video/mp4">
</video>
</div>

<div class="slide">
<h3 class="mb-4">Connect</h3>
<div class="flex justify-around text-2xl">
<a href="https://www.facebook.com/waypointvr" target="_blank">
<i class="fa-brands fa-facebook"></i>
</a>
<a href="https://www.instagram.com/waypoint.vr" target="_blank">
<i class="fa-brands fa-instagram"></i>
</a>
</div>
</div>

<div class="slide text-center">
<h3 class="mb-4">Contact</h3>
<a href="mailto:waypointvr605@gmail.com"
class="bg-white text-black px-4 py-3 rounded-xl font-semibold block">
waypointvr605@gmail.com
</a>
</div>

</div>

<!-- CONTROLS -->
<div class="flex justify-between px-6 pb-4 text-2xl">
<button onclick="prev()">‹</button>
<button onclick="next()">›</button>
</div>

</div>

<script>
let index = 0;
const carousel = document.getElementById('carousel');

function next(){
    index = Math.min(index+1, carousel.children.length-1);
    carousel.scrollTo({left: carousel.offsetWidth*index, behavior:'smooth'});
}

function prev(){
    index = Math.max(index-1,0);
    carousel.scrollTo({left: carousel.offsetWidth*index, behavior:'smooth'});
}

function showUI(){
    document.getElementById('ui-panel').classList.remove('hidden');
}

function hideUI(){
    document.getElementById('ui-panel').classList.add('hidden');
}

window.addEventListener('load', () => {
    const target = document.querySelector('#target');

    target.addEventListener('targetFound', showUI);
});
</script>

</body>
</html>
