<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>AR Business Card • Waypoint VR</title>
   
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
   
    <!-- A-Frame -->
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
   
    <!-- MindAR Image Tracking -->
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
       
        :root {
            --tw-color-primary: #0ea5e9;
        }
       
        body {
            font-family: 'Inter', system_ui, sans-serif;
        }
       
        .ar-scene {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
       
        #ui-panel {
            animation: slideUp 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
       
        @keyframes slideUp {
            0% { transform: translateY(100px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }
       
        .carousel-container {
            scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch;
        }
       
        .carousel-slide {
            scroll-snap-align: start;
            flex-shrink: 0;
        }
        
        /* Make carousel float above the AR tracking image */
        #ui-panel {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 50;
            width: 92%;
            max-width: 420px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.5);
            overflow: hidden;
        }
    </style>
</head>
<body class="bg-black text-white overflow-hidden">
    <!-- AR Scene -->
    <a-scene id="ar-scene"
             class="ar-scene"
             mindar-image="imageTargetSrc: ./targets.mind; showStats: false; uiScanning: #scanning-overlay;"
             color-space="sRGB"
             renderer="colorManagement: true, physicallyCorrectLights: true"
             vr-mode-ui="enabled: false"
             device-orientation-permission-ui="enabled: false"
             embedded>
       
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
        
        <a-entity id="target" mindar-image-target="targetIndex: 0">
           
            <!-- Company Logo floating above the card -->
            <a-plane id="logo-plane"
                     position="0 0.35 0.02"
                     rotation="0 0 0"
                     width="0.65"
                     height="0.325"
                     material="src: ./logo.png; transparent: true; side: double">
            </a-plane>
            
            <!-- VR Goggles floating above the card -->
            <a-entity id="goggles" position="0 0.78 0" scale="0.75 0.75 0.75">
                <!-- Frame -->
                <a-box position="0 0 0" width="0.42" height="0.12" depth="0.04" color="#1f2937" material="metalness: 0.9; roughness: 0.2"></a-box>
               
                <!-- Left lens frame -->
                <a-ring position="-0.13 0 0.02" radius-inner="0.055" radius-outer="0.075" rotation="90 0 0" color="#111827"></a-ring>
                <!-- Right lens frame -->
                <a-ring position="0.13 0 0.02" radius-inner="0.055" radius-outer="0.075" rotation="90 0 0" color="#111827"></a-ring>
               
                <!-- Glass lenses -->
                <a-circle position="-0.13 0 0.025" radius="0.055" rotation="90 0 0" color="#0ea5e9" opacity="0.65" material="side: double; transparent: true"></a-circle>
                <a-circle position="0.13 0 0.025" radius="0.055" rotation="90 0 0" color="#0ea5e9" opacity="0.65" material="side: double; transparent: true"></a-circle>
               
                <!-- Nose bridge -->
                <a-box position="0 0.02 0.01" width="0.08" height="0.04" depth="0.03" color="#1f2937"></a-box>
               
                <!-- Gentle floating animation -->
                <a-animation attribute="position"
                             to="0 0.85 0"
                             dur="2400"
                             easing="ease-in-out"
                             direction="alternate"
                             repeat="indefinite"></a-animation>
            </a-entity>
        </a-entity>
    </a-scene>

    <!-- Scanning Overlay -->
    <div id="scanning-overlay"
         class="fixed inset-0 bg-black/70 flex flex-col items-center justify-center z-50 pointer-events-none">
        <div class="text-center max-w-xs">
            <div class="mx-auto w-16 h-16 border-4 border-sky-400 border-t-transparent rounded-full animate-spin mb-6"></div>
            <h1 class="text-2xl font-semibold mb-2">Point your camera at the business card</h1>
            <p class="text-sky-200 text-sm">No app required • Instant in-browser AR</p>
        </div>
    </div>

    <!-- Floating Carousel UI (now centered and floating above the AR image) -->
    <div id="ui-panel" class="hidden">
       
        <!-- Header with Logo only (clickable to website) -->
        <div class="px-6 pt-5 pb-3 flex items-center justify-between border-b border-white/10">
            <a href="https://www.waypoint-vr.com" target="_blank" class="flex items-center">
                <img src="./logo.png" alt="Waypoint VR" class="w-10 h-10 object-contain rounded-2xl">
            </a>
            
            <!-- Close button -->
            <button onclick="hideUI()" 
                    class="w-9 h-9 flex items-center justify-center text-white hover:bg-white/10 rounded-2xl transition-colors text-xl">
                ✕
            </button>
        </div>

        <!-- Carousel -->
        <div id="carousel"
             class="carousel-container flex overflow-x-auto snap-x snap-mandatory scrollbar-hide px-5 pb-6 pt-4 gap-4">
           
            <!-- Slide 1: Welcome -->
            <div class="carousel-slide w-full min-w-full bg-white/10 backdrop-blur-xl rounded-3xl p-6 flex flex-col items-center text-center">
                <img src="./logo.png" alt="Waypoint VR" class="w-24 h-24 object-contain mb-5 rounded-2xl shadow-inner">
                <h3 class="text-2xl font-semibold text-white mb-2">Welcome to Waypoint VR</h3>
                <p class="text-sky-200">Immersive AR &amp; VR Experiences</p>
            </div>
           
            <!-- Slide 2: Video -->
            <div class="carousel-slide w-full min-w-full bg-white/10 backdrop-blur-xl rounded-3xl p-6">
                <h4 class="font-medium text-white mb-3 flex items-center gap-2">
                    <span class="text-lg">🎥</span> Company Promo
                </h4>
                <div class="aspect-video bg-black rounded-2xl overflow-hidden shadow-inner">
                    <video id="promo-video" 
                           width="100%" 
                           height="100%" 
                           controls 
                           class="w-full h-full rounded-2xl">
                        <source src="AR Promo.mp4" type="video/mp4">
                        Your browser does not support the video tag.
                    </video>
                </div>
                <p class="text-xs text-white/60 mt-4 text-center">Watch our AR/VR promo video</p>
            </div>
           
            <!-- Slide 3: Social Media -->
            <div class="carousel-slide w-full min-w-full bg-white/10 backdrop-blur-xl rounded-3xl p-6">
                <h4 class="font-medium text-white mb-4 flex items-center gap-2">
                    <span class="text-lg">🔗</span> Follow Us
                </h4>
                <div class="grid grid-cols-2 gap-4">
                    <a href="https://www.facebook.com/waypointvr" target="_blank"
                       class="flex flex-col items-center gap-2 bg-white/10 hover:bg-white/20 transition-colors rounded-2xl p-5">
                        <i class="fa-brands fa-facebook text-4xl text-blue-400"></i>
                        <span class="text-sm font-medium">Facebook</span>
                    </a>
                    <a href="https://www.instagram.com/waypointvr" target="_blank"
                       class="flex flex-col items-center gap-2 bg-white/10 hover:bg-white/20 transition-colors rounded-2xl p-5">
                        <i class="fa-brands fa-instagram text-4xl text-pink-400"></i>
                        <span class="text-sm font-medium">Instagram</span>
                    </a>
                </div>
            </div>
           
            <!-- Slide 4: Contact -->
            <div class="carousel-slide w-full min-w-full bg-white/10 backdrop-blur-xl rounded-3xl p-6 flex flex-col">
                <h4 class="font-medium text-white mb-6 flex items-center gap-2">
                    <span class="text-lg">📧</span> Get in Touch
                </h4>
                <a href="mailto:waypointvr605@gmail.com"
                   class="block bg-white text-black font-semibold text-center py-4 rounded-3xl mb-6 hover:scale-105 transition-transform">
                    📩 waypointvr605@gmail.com
                </a>
                <div class="mt-auto text-xs text-white/50 text-center">
                    Built with MindAR + A-Frame
                </div>
            </div>
        </div>

        <!-- Carousel controls -->
        <div class="flex justify-between px-8 pb-6 text-4xl text-white/60">
            <button onclick="prevSlide()" class="hover:text-white transition-colors">‹</button>
            <button onclick="nextSlide()" class="hover:text-white transition-colors">›</button>
        </div>
    </div>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <script>
        // Carousel controls
        let currentSlide = 0;
        const carousel = document.getElementById('carousel');

        function nextSlide() {
            currentSlide = Math.min(currentSlide + 1, carousel.children.length - 1);
            carousel.scrollTo({
                left: carousel.offsetWidth * currentSlide,
                behavior: 'smooth'
            });
        }

        function prevSlide() {
            currentSlide = Math.max(currentSlide - 1, 0);
            carousel.scrollTo({
                left: carousel.offsetWidth * currentSlide,
                behavior: 'smooth'
            });
        }

        // Show / Hide UI
        function showUI() {
            const panel = document.getElementById('ui-panel');
            const scanning = document.getElementById('scanning-overlay');
            panel.classList.remove('hidden');
            scanning.classList.add('hidden');
        }

        function hideUI() {
            const panel = document.getElementById('ui-panel');
            const scanning = document.getElementById('scanning-overlay');
            panel.classList.add('hidden');
            scanning.classList.remove('hidden');
        }

        // Demo goggles highlight
        function demoGoggles() {
            const goggles = document.getElementById('goggles');
            if (goggles) {
                goggles.setAttribute('scale', '1.2 1.2 1.2');
                setTimeout(() => {
                    goggles.setAttribute('scale', '0.75 0.75 0.75');
                }, 300);
            }
        }

        // MindAR Events
        window.addEventListener('load', () => {
            const target = document.querySelector('#target');
            
            if (!target) {
                console.error('Target element not found');
                return;
            }

            target.addEventListener('targetFound', () => {
                console.log('✅ Waypoint VR card detected');
                showUI();
            });

            target.addEventListener('targetLost', () => {
                // Optional: hideUI() if you want UI to disappear when card is lost
            });

            console.log('%c🎉 Waypoint VR AR Business Card ready!', 'color:#0ea5e9; font-weight:bold');
        });
    </script>
</body>
</html>
