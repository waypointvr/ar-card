<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Waypoint VR • AR Card</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
body {
    margin:0;
    overflow:hidden;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", system-ui;
}

/* AR SCENE */
.ar-scene {
    position: fixed;
    inset: 0;
    z-index: 1;
}

/* ===========================
   🍎 APPLE-STYLE HOLOGRAM UI
   =========================== */

#ui-panel {
    position: fixed;
    bottom: 22px;
    left: 50%;
    transform: translateX(-50%);
    width: 94%;
    max-width: 440px;
    z-index: 10;

    /* 🔥 darker, tighter glass */
    background: rgba(10, 10, 15, 0.5);
    backdrop-filter: blur(18px) saturate(180%);

    border-radius: 28px;
    border: 1px solid rgba(255,255,255,0.12);

    box-shadow:
        0 20px 60px rgba(0,0,0,0.65),
        inset 0 1px 0 rgba(255,255,255,0.08);

    overflow: hidden;

    animation: floatUp .35s ease;
}

@keyframes floatUp {
    from { transform: translate(-50%,30px); opacity:0; }
    to { transform: translate(-50%,0); opacity:1; }
}

/* HEADER */
.header {
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding: 14px 16px 8px 16px;
}

.header img {
    width:42px;
    height:42px;
    border-radius:12px;
    cursor:pointer;
}

/* ===========================
   📱 FULL BLEED CAROUSEL
   =========================== */

.carousel {
    display:flex;
    overflow-x:auto;
    scroll-snap-type:x mandatory;
    scroll-behavior:smooth;
}

/* MUCH LARGER SLIDES */
.slide {
    min-width:100%;
    padding: 18px 18px 26px 18px;
    scroll-snap-align:start;
}

/* TEXT SYSTEM (Apple-like hierarchy) */
h2 {
    font-size: 20px;
    font-weight: 600;
    letter-spacing: -0.02em;
}

h3 {
    font-size: 16px;
    font-weight: 500;
    opacity: 0.9;
}

/* VIDEO / MEDIA FULL WIDTH FEEL */
.media {
    width: 100%;
    border-radius: 16px;
    overflow: hidden;
    margin-top: 10px;
}

/* ===========================
   🌌 HOLOGRAPHIC GLOW BEHIND UI
   =========================== */

.holo-glow {
    position: absolute;
    width: 120px;
    height: 120px;
    border-radius: 50%;
    background: radial-gradient(
        circle,
        rgba(56,189,248,0.35),
        rgba(56,189,248,0.05),
        transparent 70%
    );
    filter: blur(8px);

    /* sits behind UI but in front of camera via AR scene */
    pointer-events: none;
}
</style>
</head>

<body>

<!-- AR SCENE -->
<a-scene class="ar-scene"
mindar-image="imageTargetSrc: ./targets.mind;"
embedded
vr-mode-ui="enabled:false"
device-orientation-permission-ui="enabled:false">

<a-camera position="0 0 0"></a-camera>

<a-entity id="target" mindar-image-target="targetIndex: 0">

<!-- LOGO -->
<a-plane position="0 0.2 0"
width="0.6" height="0.3"
material="src: ./logo.png; transparent:true">
</a-plane>

<!-- 🌌 SOFT HOLOGRAM GLOW (NO ANIMATION, JUST PRESENCE) -->
<a-circle position="0 0 0.01"
radius="0.6"
color="#38bdf8"
opacity="0.12">
</a-circle>

<a-circle position="0 0 -0.01"
radius="0.9"
color="#38bdf8"
opacity="0.06">
</a-circle>

</a-entity>
</a-scene>

<!-- FLOATING UI -->
<div id="ui-panel" class="hidden text-white">

<div class="header">
<a href="https://www.waypoint-vr.com" target="_blank">
<img src="./logo.png">
</a>
<button onclick="hideUI()" style="color:white; font-size:18px;">✕</button>
</div>

<!-- CAROUSEL -->
<div id="carousel" class="carousel">

<!-- SLIDE 1 -->
<div class="slide text-center">
<img src="./logo.png" class="w-28 mx-auto mb-3 rounded-2xl">
<h2>Waypoint VR</h2>
<p class="text-sky-300 text-sm mt-1">Immersive AR experiences</p>
</div>

<!-- SLIDE 2 -->
<div class="slide">
<h3>Demo</h3>
<video controls class="media">
<source src="./AR Promo.mp4" type="video/mp4">
</video>
</div>

<!-- SLIDE 3 -->
<div class="slide">
<h3>Connect</h3>
<div class="flex justify-around text-2xl mt-4">
<a href="https://www.facebook.com/waypointvr" target="_blank">
<i class="fa-brands fa-facebook"></i>
</a>
<a href="https://www.instagram.com/waypoint.vr" target="_blank">
<i class="fa-brands fa-instagram"></i>
</a>
</div>
</div>

<!-- SLIDE 4 -->
<div class="slide text-center">
<h3>Contact</h3>
<a href="mailto:waypointvr605@gmail.com"
class="block mt-4 bg-white text-black px-4 py-3 rounded-xl font-medium">
waypointvr605@gmail.com
</a>
</div>

</div>

<!-- CONTROLS -->
<div class="flex justify-between px-6 pb-4 text-2xl opacity-80">
<button onclick="prev()">‹</button>
<button onclick="next()">›</button>
</div>

</div>

<script>
let index = 0;
const carousel = document.getElementById('carousel');

function next(){
    index = Math.min(index+1, carousel.children.length-1);
    carousel.scrollTo({left: carousel.offsetWidth*index, behavior:'smooth'});
}

function prev(){
    index = Math.max(index-1,0);
    carousel.scrollTo({left: carousel.offsetWidth*index, behavior:'smooth'});
}

function showUI(){
    document.getElementById('ui-panel').classList.remove('hidden');
}

function hideUI(){
    document.getElementById('ui-panel').classList.add('hidden');
}

window.addEventListener('load', () => {
    const target = document.querySelector('#target');
    target.addEventListener('targetFound', showUI);
});
</script>

</body>
</html>
