<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AR Business Card</title>

<script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

<style>
body {
    margin:0;
    overflow:hidden;
    font-family: -apple-system, BlinkMacSystemFont, system-ui;
}
</style>
</head>

<body>

<a-scene
mindar-image="imageTargetSrc: ./targets.mind;"
embedded
vr-mode-ui="enabled:false"
device-orientation-permission-ui="enabled:false">

<a-assets>
<img id="logo" src="./logo.png">
</a-assets>

<a-camera position="0 0 0" cursor="fuse: false; rayOrigin: mouse"
raycaster="objects: .clickable"></a-camera>

<a-entity id="target" mindar-image-target="targetIndex: 0">

<!-- =========================
     🌌 BASE HOLOGRAPHIC GLOW
     ========================= -->
<a-entity id="glow" position="0 0 0" opacity="0">
    
    <a-circle radius="0.8"
        color="#38bdf8"
        opacity="0.15">
    </a-circle>

    <a-circle radius="1.1"
        color="#38bdf8"
        opacity="0.07"
        position="0 0 -0.01">
    </a-circle>

</a-entity>

<!-- =========================
     🧊 MAIN CONTENT WRAPPER
     ========================= -->
<a-entity id="cardContent" position="0 0 0.05" scale="0.8 0.8 0.8">

    <!-- LOGO -->
    <a-plane
        src="#logo"
        width="0.6"
        height="0.3"
        position="0 0.25 0"
        material="transparent:true; opacity:0"
        id="logoPlane">
    </a-plane>

    <!-- COMPANY NAME -->
    <a-text
        value="YOUR COMPANY NAME"
        align="center"
        color="#FFFFFF"
        width="2"
        position="0 0.55 0"
        opacity="0"
        id="titleText">
    </a-text>

    <!-- TAGLINE -->
    <a-text
        value="Immersive AR Experiences"
        align="center"
        color="#38bdf8"
        width="2"
        position="0 0.4 0"
        opacity="0"
        id="taglineText">
    </a-text>

    <!-- =========================
         🔘 BUTTON ROW
         ========================= -->
    <a-entity position="0 -0.1 0">

        <!-- WEBSITE BUTTON -->
        <a-plane
            class="clickable"
            color="#ffffff"
            width="0.5"
            height="0.18"
            position="-0.3 0 0"
            opacity="0.9"
            id="websiteBtn">
        </a-plane>

        <a-text
            value="Website"
            align="center"
            color="#000"
            width="2"
            position="-0.3 0 0.01">
        </a-text>

        <!-- EMAIL BUTTON -->
        <a-plane
            class="clickable"
            color="#38bdf8"
            width="0.5"
            height="0.18"
            position="0.3 0 0"
            opacity="0.9"
            id="emailBtn">
        </a-plane>

        <a-text
            value="Email"
            align="center"
            color="#000"
            width="2"
            position="0.3 0 0.01">
        </a-text>

    </a-entity>

</a-entity>

</a-entity>
</a-scene>

<script>
const target = document.querySelector("#target");

target.addEventListener("targetFound", () => {

    // GLOW FADE IN
    document.querySelector("#glow").setAttribute("animation", {
        property: "opacity",
        to: 1,
        dur: 600,
        easing: "easeOutQuad"
    });

    // CONTENT SCALE + RISE
    document.querySelector("#cardContent").setAttribute("animation", {
        property: "scale",
        from: "0.8 0.8 0.8",
        to: "1 1 1",
        dur: 600,
        easing: "easeOutBack"
    });

    document.querySelector("#cardContent").setAttribute("animation__y", {
        property: "position",
        from: "0 0 0.05",
        to: "0 0.05 0.05",
        dur: 600,
        easing: "easeOutQuad"
    });

    // FADE ELEMENTS IN
    ["logoPlane","titleText","taglineText"].forEach(id=>{
        document.querySelector("#"+id).setAttribute("animation",{
            property:"opacity",
            from:0,
            to:1,
            dur:800,
            easing:"easeOutQuad"
        });
    });

    // FLOATING IDLE ANIMATION
    document.querySelector("#cardContent").setAttribute("animation__float", {
        property: "position",
        dir: "alternate",
        dur: 3000,
        loop: true,
        to: "0 0.07 0.05",
        easing: "easeInOutSine"
    });

});


// =========================
// 🔗 INTERACTIONS
// =========================

document.querySelector("#websiteBtn").addEventListener("click", () => {
    window.open("https://yourwebsite.com", "_blank");
});

document.querySelector("#emailBtn").addEventListener("click", () => {
    window.location.href = "mailto:you@company.com";
});
</script>

</body>
</html>
