<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Waypoint VR • AR Card</title>

<script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

<style>
body { margin:0; overflow:hidden; }
</style>
</head>

<body>

<a-scene
mindar-image="imageTargetSrc: ./targets.mind;"
embedded
vr-mode-ui="enabled:false"
device-orientation-permission-ui="enabled:false">

<a-camera position="0 0 0"></a-camera>

<a-assets>
<video id="videoTex" src="./AR Promo.mp4" autoplay loop muted></video>
<img id="logoTex" src="./logo.png">
</a-assets>

<a-entity id="target" mindar-image-target="targetIndex: 0">

<!-- LOGO BUTTON -->
<a-plane position="0 0.35 0.01"
width="0.6" height="0.3"
material="src: #logoTex; transparent: true"
class="clickable"
id="logoBtn">
</a-plane>

<!-- CAROUSEL ROOT -->
<a-entity id="carouselRoot" position="0 -0.5 0.05">

<!-- MASK PANEL -->
<a-plane width="1.2" height="0.7"
color="#000" opacity="0.25" radius="0.05">
</a-plane>

<!-- SLIDES CONTAINER -->
<a-entity id="slidesContainer">

<!-- Slide 1 -->
<a-entity class="slide" position="0 0 0">
<a-text value="Waypoint VR"
align="center" position="0 0.15 0.01" width="2"></a-text>
<a-text value="Immersive AR experiences"
align="center" position="0 0.05 0.01"
color="#38bdf8" width="2"></a-text>
</a-entity>

<!-- Slide 2 -->
<a-entity class="slide" position="1.3 0 0">
<a-text value="Demo"
align="center" position="0 0.2 0.01" width="2"></a-text>
<a-plane position="0 -0.05 0.01"
width="0.9" height="0.45"
material="src: #videoTex"></a-plane>
</a-entity>

<!-- Slide 3 -->
<a-entity class="slide" position="2.6 0 0">
<a-text value="Connect"
align="center" position="0 0.2 0.01" width="2"></a-text>

<a-text value="Facebook"
position="-0.3 -0.05 0.01"
color="#3b82f6"
class="clickable"
id="fbBtn"></a-text>

<a-text value="Instagram"
position="0.3 -0.05 0.01"
color="#f472b6"
class="clickable"
id="igBtn"></a-text>
</a-entity>

<!-- Slide 4 -->
<a-entity class="slide" position="3.9 0 0">
<a-text value="Contact"
align="center" position="0 0.2 0.01" width="2"></a-text>
<a-text value="waypointvr605@gmail.com"
align="center" position="0 0 0.01"
width="2"></a-text>
</a-entity>

</a-entity>
</a-entity>

</a-entity>
</a-scene>

<script>
const container = document.querySelector('#slidesContainer');

let isDragging = false;
let startX = 0;
let currentX = 0;
let velocity = 0;

let currentIndex = 0;
const slideWidth = 1.3;
const maxIndex = 3;

/* DRAG START */
document.addEventListener('touchstart', (e)=>{
    isDragging = true;
    startX = e.touches[0].clientX;
});

/* DRAG MOVE */
document.addEventListener('touchmove', (e)=>{
    if(!isDragging) return;

    let dx = e.touches[0].clientX - startX;
    let move = currentIndex * -slideWidth + dx * 0.002;

    container.setAttribute('position', `${move} 0 0`);

    velocity = dx;
});

/* DRAG END */
document.addEventListener('touchend', ()=>{
    if(!isDragging) return;
    isDragging = false;

    if(velocity < -30 && currentIndex < maxIndex){
        currentIndex++;
    } else if(velocity > 30 && currentIndex > 0){
        currentIndex--;
    }

    snapToSlide();
});

/* SNAP ANIMATION */
function snapToSlide(){
    let targetX = -currentIndex * slideWidth;

    container.setAttribute('animation', {
        property: 'position',
        to: `${targetX} 0 0`,
        dur: 300,
        easing: 'easeOutQuad'
    });
}

/* LINKS */
document.querySelector('#logoBtn')
.addEventListener('click', ()=> window.open("https://www.waypoint-vr.com"));

document.querySelector('#fbBtn')
.addEventListener('click', ()=> window.open("https://www.facebook.com/waypointvr"));

document.querySelector('#igBtn')
.addEventListener('click', ()=> window.open("https://www.instagram.com/waypoint.vr"));
</script>

</body>
</html>
