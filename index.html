<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Waypoint VR • AR Card</title>

<script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
body { margin:0; overflow:hidden; }
</style>
</head>

<body>

<a-scene
mindar-image="imageTargetSrc: ./targets.mind;"
embedded
vr-mode-ui="enabled:false"
device-orientation-permission-ui="enabled:false">

<a-camera position="0 0 0" look-controls="enabled:false"></a-camera>

<a-entity id="target" mindar-image-target="targetIndex: 0">

<!-- LOGO -->
<a-plane position="0 0.3 0.01" width="0.6" height="0.3"
material="src: ./logo.png; transparent: true;"
class="clickable"
event-set__click="_event: click; _target: #link; visible: true">
</a-plane>

<!-- UI PANEL IN AR -->
<a-entity id="ar-ui" position="0 -0.5 0.05">

<!-- BACK PANEL -->
<a-plane width="1.2" height="0.7" color="#000" opacity="0.4" radius="0.05"></a-plane>

<!-- SLIDES -->
<a-entity id="slides">

<!-- SLIDE 1 -->
<a-entity class="slide" visible="true">
<a-text value="Waypoint VR"
align="center"
position="0 0.15 0.01"
width="2"></a-text>

<a-text value="Immersive AR experiences"
align="center"
position="0 0.05 0.01"
color="#38bdf8"
width="2"></a-text>
</a-entity>

<!-- SLIDE 2 -->
<a-entity class="slide" visible="false">
<a-text value="Watch Demo"
align="center"
position="0 0.1 0.01"
width="2"></a-text>

<a-plane position="0 -0.1 0.01"
width="0.8"
height="0.4"
material="src: #videoTex">
</a-plane>
</a-entity>

<!-- SLIDE 3 -->
<a-entity class="slide" visible="false">

<a-text value="Connect"
align="center"
position="0 0.15 0.01"
width="2"></a-text>

<a-text value="Facebook"
position="-0.3 -0.05 0.01"
class="clickable"
color="#3b82f6"></a-text>

<a-text value="Instagram"
position="0.3 -0.05 0.01"
class="clickable"
color="#f472b6"></a-text>

</a-entity>

<!-- SLIDE 4 -->
<a-entity class="slide" visible="false">
<a-text value="Email Us"
align="center"
position="0 0.1 0.01"
width="2"></a-text>

<a-text value="waypointvr605@gmail.com"
align="center"
position="0 -0.05 0.01"
color="#fff"></a-text>
</a-entity>

</a-entity>

<!-- BUTTONS -->
<a-text value="‹"
position="-0.5 -0.25 0.02"
scale="2 2 2"
class="clickable"
id="prevBtn"></a-text>

<a-text value="›"
position="0.5 -0.25 0.02"
scale="2 2 2"
class="clickable"
id="nextBtn"></a-text>

</a-entity>

</a-entity>

<!-- VIDEO ASSET -->
<a-assets>
<video id="videoTex" src="./AR Promo.mp4" autoplay loop="true" muted></video>
</a-assets>

</a-scene>

<script>
let current = 0;
const slides = document.querySelectorAll('.slide');

function showSlide(i){
    slides.forEach((s, index)=>{
        s.setAttribute('visible', index === i);
    });
}

document.querySelector('#nextBtn').addEventListener('click', ()=>{
    current = (current + 1) % slides.length;
    showSlide(current);
});

document.querySelector('#prevBtn').addEventListener('click', ()=>{
    current = (current - 1 + slides.length) % slides.length;
    showSlide(current);
});

/* SOCIAL LINKS */
document.querySelectorAll('[value="Facebook"]')[0]
?.addEventListener('click', ()=> window.open("https://www.facebook.com/waypointvr"));

document.querySelectorAll('[value="Instagram"]')[0]
?.addEventListener('click', ()=> window.open("https://www.instagram.com/waypoint.vr"));

/* LOGO LINK */
document.querySelector('#target').addEventListener('click', ()=>{
    window.open("https://www.waypoint-vr.com");
});
</script>

</body>
</html>
